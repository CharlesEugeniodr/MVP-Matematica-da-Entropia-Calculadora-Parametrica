name: CI — IFE Structural Fragility Index

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx eslint js/**/*.js --max-warnings=20

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test

  validate:
    name: Model Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node -e "
          const fs = require('fs');
          const model = fs.readFileSync('js/model.js', 'utf8');
          const realdata = fs.readFileSync('js/realdata.js', 'utf8');
          console.log('✅ All source files readable');
          console.log('  model.js:', model.length, 'bytes');
          console.log('  realdata.js:', realdata.length, 'bytes');
          if (!model.includes('simulate')) throw new Error('model.js missing simulate()');
          if (!realdata.includes('WORLD_POPULATION')) throw new Error('realdata.js missing data');
          console.log('✅ Smoke tests passed');
        "
